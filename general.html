<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Professor - General Mode</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
}
.header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #00ffaa;
    border-bottom: 2px solid #222;
}
.container {
    display: flex;
    height: calc(100vh - 80px);
}
.avatar-section {
    width: 30%;
    background: #141414;
    border-right: 2px solid #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.avatar {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: url('assets/avatar_idle.png') center/cover no-repeat;
    border: 3px solid #00ffaa;
}
.chat-section {
    width: 70%;
    padding: 20px;
    display: flex;
    flex-direction: column;
}
.chat-box {
    flex: 1;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    overflow-y: auto;
}
.input-bar {
    display: flex;
    margin-top: 15px;
}
input {
    flex: 1;
    padding: 15px;
    background: #222;
    color: #fff;
    border-radius: 10px;
    border: none;
}
button {
    margin-left: 10px;
    padding: 15px 25px;
    background: #00ffaa;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">General Teaching Mode</div>

<div class="container">

<div class="avatar-section">
    <div class="avatar"></div>
    <h2>AI Professor</h2>
    <p>Ask anything ✨</p>
</div>

<div class="chat-section">
    <div class="chat-box" id="chatBox">
        <p><strong>AI Professor:</strong> Hello! What would you like to learn today?</p>
    </div>

    <div class="input-bar">
        <input id="userInput" placeholder="Ask any question..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const chat = document.getElementById("chatBox");
    const question = input.value.trim();
    if (!question) return;

    chat.innerHTML += `<p><strong>You:</strong> ${question}</p>`;
    chat.innerHTML += `<p><em>AI Professor is thinking...</em></p>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    const res = await fetch("http://127.0.0.1:5000/general", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question })
    });

    const data = await res.json();
    chat.innerHTML += `<p><strong>AI Professor:</strong> ${data.answer}</p>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
