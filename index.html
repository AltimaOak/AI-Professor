<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Professor - Select Mode</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f 70%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        .welcome {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #00ffdd, #00ffaa, #0aff9b);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(0, 255, 180, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .modes {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .mode-card {
            width: 300px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 18px;
            padding: 28px;
            cursor: pointer;
            transition: 0.35s ease;
            border: 2px solid #222;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.1);
            position: relative;
            overflow: hidden;
        }

        .mode-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,255,170,0.15), transparent 60%);
            opacity: 0;
            transition: 0.4s;
        }

        .mode-card:hover::after {
            opacity: 1;
        }

        .mode-card:hover {
            transform: scale(1.07);
            border-color: #00ffaa;
            box-shadow: 0 0 30px rgba(0, 255, 150, 0.4);
        }

        .mode-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #00ffaa;
        }

        .mode-desc {
            opacity: 0.85;
            font-size: 15px;
        }

        .mode-card:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="welcome">Welcome to AI Professor</div>
    <div class="subtitle">Choose how you want to learn today</div>

    <div class="modes">

        <div class="mode-card" onclick="selectMode('general')">
            <div class="mode-title">General Mode</div>
            <div class="mode-desc">
                Ask anything! AI explains using global knowledge.
            </div>
        </div>

        <div class="mode-card" onclick="selectMode('syllabus')">
            <div class="mode-title">Syllabus Mode</div>
            <div class="mode-desc">
                Upload syllabus or topics — AI teaches only that.
            </div>
        </div>

    </div>
</div>

<script>
function selectMode(mode) {
    // Store mode (useful later for analytics, avatar behavior, etc.)
    localStorage.setItem("ai_mode", mode);

    // Small delay for click feel
    setTimeout(() => {
        if (mode === "general") {
            window.location.href = "general.html";
        } else {
            window.location.href = "syllabus.html";
        }
    }, 200);
}
</script>

</body>
</html>
